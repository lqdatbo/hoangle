<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hand FX V4 Ultimate</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui}
#cam{position:fixed;inset:0}
video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#ui{
position:fixed;top:10px;left:50%;transform:translateX(-50%);
color:white;text-align:center;background:rgba(0,0,0,.35);
padding:10px 18px;border-radius:16px;backdrop-filter:blur(10px)
}
#start{padding:10px 20px;border:none;border-radius:10px;cursor:pointer}
</style>
</head>
<body>

<div id="cam">
<video id="video" autoplay playsinline muted></video>
<canvas id="fx"></canvas>
</div>

<div id="ui">
<div id="combo">Ready</div>
<button id="start">Start Camera</button>
</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("fx");
const ctx=canvas.getContext("2d");
const combo=document.getElementById("combo");

let history=[];

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

function fingerExtended(lm,mcp,pip,dip,tip){
 const a=Math.atan2(lm[pip].y-lm[mcp].y,lm[pip].x-lm[mcp].x);
 const b=Math.atan2(lm[tip].y-lm[dip].y,lm[tip].x-lm[dip].x);
 return Math.abs(a-b)<0.5;
}

function stableGesture(name){
 history.push(name);
 if(history.length>12) history.shift();

 let count=0;
 for(const h of history){
   if(h===name) count++;
 }
 return count>=8;
}

let particles=[];

function addTrail(x,y,color){
 particles.push({x,y,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,life:1,color});
}

function renderParticles(){
 for(let i=particles.length-1;i>=0;i--){
   const p=particles[i];
   ctx.beginPath();
   ctx.arc(p.x,p.y,12*p.life,0,Math.PI*2);
   const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,20);
   g.addColorStop(0,"rgba(255,255,255,"+p.life+")");
   g.addColorStop(1,p.color);
   ctx.fillStyle=g;
   ctx.fill();
   p.x+=p.vx;
   p.y+=p.vy;
   p.life-=0.03;
   if(p.life<=0) particles.splice(i,1);
 }
}

function activePoint(x,y,color){
 ctx.beginPath();
 ctx.arc(x,y,18,0,Math.PI*2);
 ctx.fillStyle=color;
 ctx.shadowBlur=30;
 ctx.shadowColor=color;
 ctx.fill();
 ctx.shadowBlur=0;

 for(let i=0;i<4;i++) addTrail(x,y,color);
}

function process(results){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(results.multiHandLandmarks){
   for(const lm of results.multiHandLandmarks){

     const idx=fingerExtended(lm,5,6,7,8);
     const mid=fingerExtended(lm,9,10,11,12);
     const pnk=fingerExtended(lm,17,18,19,20);

     if(idx){
        const x=(1-lm[8].x)*canvas.width;
        const y=lm[8].y*canvas.height;
        activePoint(x,y,"#ff7b00");
        if(stableGesture("portal")) combo.innerText="🌀 Portal";
     }

     if(mid){
        const x=(1-lm[12].x)*canvas.width;
        const y=lm[12].y*canvas.height;
        activePoint(x,y,"#00d4ff");
        if(stableGesture("bubble")) combo.innerText="🔵 Bubble";
     }

     if(pnk){
        const x=(1-lm[20].x)*canvas.width;
        const y=lm[20].y*canvas.height;
        activePoint(x,y,"#d86dff");
        if(stableGesture("star")) combo.innerText="✨ Star Dust";
     }
   }
 }

 renderParticles();
}

document.getElementById("start").onclick=async()=>{

 const stream=await navigator.mediaDevices.getUserMedia({
   video:{
      facingMode:"user",
      width:{ideal:1280},
      height:{ideal:720}
   }
 });

 video.srcObject=stream;

 const hands=new Hands({
   locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
 });

 hands.setOptions({
   maxNumHands:2,
   modelComplexity:2,
   minDetectionConfidence:0.85,
   minTrackingConfidence:0.85
 });

 hands.onResults(process);

 const camera=new Camera(video,{
   onFrame:async()=>{
      await hands.send({image:video});
   },
   width:1280,
   height:720
 });

 camera.start();
 document.getElementById("start").style.display="none";
};
</script>
</body>
</html>
