<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resident Room Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">

  <div class="max-w-[1800px] mx-auto">
    <div class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-3xl font-bold">Resident Room Dashboard</h1>
        <p class="text-gray-500 mt-1">Theo dõi tình trạng phòng và khách lưu trú</p>
      </div>

      <div class="flex gap-4">
        <div class="bg-white rounded-2xl shadow p-4 text-center w-36">
          <div class="text-gray-400">Tổng phòng</div>
          <div id="totalRooms" class="text-2xl font-bold"></div>
        </div>

        <div class="bg-white rounded-2xl shadow p-4 text-center w-36">
          <div class="text-gray-400">Đang sử dụng</div>
          <div id="occupiedRooms" class="text-2xl font-bold text-blue-600"></div>
        </div>

        <div class="bg-white rounded-2xl shadow p-4 text-center w-36">
          <div class="text-gray-400">Phòng trống</div>
          <div id="emptyRooms" class="text-2xl font-bold text-green-600"></div>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow overflow-auto border">
      <div id="dashboard" class="overflow-x-auto"></div>
    </div>
  </div>

  <script>
    // =========================
    // GOOGLE SHEET CONFIG
    // =========================
    const SHEET_ID = '1ImwCxw0HGk8bOEdJRQE_Iv5uBgbr1P79ONPVVJGcgzI';
    const SHEET_NAME = 'DATA';
    const API_URL = `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

    // =========================
    // ROOM LIST
    // =========================
    const roomList = [
      '301','302',
      '401','402',
      '501','502',
      '601','602',
      '701','702',
      '801','802',
      '901','902'
    ];

    const today = new Date();

    function formatDate(date) {
      return date.toISOString().split('T')[0];
    }

    function isToday(date) {
      return formatDate(date) === formatDate(today);
    }

    function parseDate(dateStr) {
      if (!dateStr) return null;
      if (dateStr.includes('/')) {
        const parts = dateStr.split('/');
        return new Date(parts[2], parts[1] - 1, parts[0]);
      }
      return new Date(dateStr);
    }

    function isWithinStay(day, arrival, departure) {
      const d = new Date(formatDate(day));
      const arrivalDate = parseDate(arrival);
      const departureDate = parseDate(departure);
      if (!arrivalDate || !departureDate) return false;
      return d >= arrivalDate && d <= departureDate;
    }

    function daysToCheckout(departure) {
      const dep = parseDate(departure);
      if (!dep) return null;
      const now = new Date();
      now.setHours(0,0,0,0);
      dep.setHours(0,0,0,0);
      const diff = dep - now;
      return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }

    async function loadDashboard() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        const residents = data.map(r => ({
          room: r.Room || '',
          name: r.Name || '',
          nationality: r.Nationality || '',
          passport: r.Passport || '',
          arrival: r.Arrival || '',
          departure: r.Departure || ''
        }));
        renderDashboard(residents);
      } catch (error) {
        console.error(error);
        document.getElementById('dashboard').innerHTML = `
          <div class="p-10 text-center text-red-600">
            Không thể kết nối Google Sheet.<br><br>
            Kiểm tra lại:<br>
            - SHEET_ID<br>
            - Tên Sheet<br>
            - Quyền public Google Sheet
          </div>
        `;
      }
    }

    function renderDashboard(residents) {
      const occupiedRooms = [...new Set(residents.map(r => r.room))];
      document.getElementById('totalRooms').innerText = roomList.length;
      document.getElementById('occupiedRooms').innerText = occupiedRooms.length;
      document.getElementById('emptyRooms').innerText = roomList.length - occupiedRooms.length;

      const dashboard = document.getElementById('dashboard');

      // TĂNG SỐ NGÀY HIỂN THỊ: Từ -5 ngày trước đến 30 ngày sau (Tổng cộng ~35 ngày để cuộn mượt mà)
      const days = [];
      for (let i = -5; i < 30; i++) {
        const d = new Date();
        d.setDate(today.getDate() + i);
        days.push(d);
      }

      // Định dạng chiều rộng các cột cố định (Phòng: 120px, Khách: 320px, Mỗi ngày: 45px để hiện rõ DD/MM)
      const gridStyle = `grid-template-columns: 120px 320px repeat(${days.length}, 45px);`;

      let html = '';

      // THANH TIÊU ĐỀ NGÀY THÁNG
      html += `
        <div class="grid sticky top-0 bg-white z-30 border-b" style="${gridStyle}">
          <div class="p-3 border-r font-bold bg-white sticky left-0 z-40">Phòng</div>
          <div class="p-3 border-r font-bold bg-white sticky left-[120px] z-40">Khách</div>
          ${days.map(day => {
            const dateNum = day.getDate();
            const monthNum = day.getMonth() + 1;
            
            // Phân biệt màu nền tiêu đề theo tháng (Tháng chẵn dùng màu Slate nhạt, tháng lẻ dùng màu trắng)
            const monthBg = monthNum % 2 === 0 ? 'bg-slate-100/80' : 'bg-white';
            const todayBg = isToday(day) ? 'bg-yellow-300 z-10 font-bold text-black' : monthBg;

            return `
              <div class="text-center text-[11px] border-r py-2 flex flex-col justify-center font-semibold ${todayBg}">
                <div>${dateNum < 10 ? '0' + dateNum : dateNum}</div>
                <div class="text-[9px] text-gray-400 font-normal">T${monthNum}</div>
              </div>
            `;
          }).join('')}
        </div>
      `;

      // NỘI DUNG TỪNG PHÒNG
      roomList.forEach(room => {
        const roomResidents = residents.filter(r => r.room === room);

        html += `
          <div class="grid border-b hover:bg-gray-50 relative" style="${gridStyle}">
            
            <div class="p-3 border-r font-semibold flex items-center sticky left-0 bg-white z-20 shadow-[2px_0_5px_rgba(0,0,0,0.05)]">
              ${room}
            </div>

            <div class="p-3 border-r space-y-2 sticky left-[120px] bg-white z-20 shadow-[2px_0_5px_rgba(0,0,0,0.05)]">
              ${roomResidents.length === 0
                ? '<div class="text-green-600 font-medium text-sm">Phòng trống</div>'
                : roomResidents.map(r => {
                    const checkoutDays = daysToCheckout(r.departure);
                    let badge = '';
                    if (checkoutDays <= 3 && checkoutDays >= 0) {
                      badge = '<span class="ml-2 text-xs bg-red-500 text-white px-2 py-0.5 rounded-full">Sắp checkout</span>';
                    }
                    return `
                      <details class="bg-blue-50 rounded-xl p-2 border border-blue-100 text-sm">
                        <summary class="cursor-pointer text-blue-700 font-medium hover:underline flex items-center justify-between">
                          <span class="truncate max-w-[150px]">${r.name}</span>
                          ${badge}
                        </summary>
                        <div class="mt-3 text-xs text-gray-700 space-y-1">
                          <div><b>Passport:</b> ${r.passport}</div>
                          <div><b>Nationality:</b> ${r.nationality}</div>
                          <div><b>Arrival:</b> ${r.arrival}</div>
                          <div><b>Departure:</b> ${r.departure}</div>
                          <div><b>Số ngày còn lại:</b> ${checkoutDays} ngày</div>
                        </div>
                      </details>
                    `;
                }).join('')
              }
            </div>

            ${days.map(day => {
              const residentInDay = roomResidents.find(r =>
                isWithinStay(day, r.arrival, r.departure)
              );

              let bgClass = 'bg-white';
              if (residentInDay) {
                const checkoutDays = daysToCheckout(residentInDay.departure);
                bgClass = (checkoutDays <= 3 && checkoutDays >= 0) ? 'bg-red-400' : 'bg-blue-400/70';
              } else {
                // Nếu là ngày trống, tạo sọc nhẹ cho các tháng chẵn để dễ nhìn form tách tháng
                if ((day.getMonth() + 1) % 2 === 0) {
                  bgClass = 'bg-gray-50/60';
                }
              }

              // LỚP PHỦ HIGHLIGHT TODAY LÊN TRÊN: Nếu là ngày hôm nay, tạo div phủ màu vàng có độ trong suốt và z-index cao hơn
              const todayOverlay = isToday(day) 
                ? '<div class="absolute inset-0 bg-yellow-400/30 pointer-events-none z-10 border-x-2 border-yellow-500"></div>' 
                : '';

              return `
                <div class="border-r min-h-[80px] relative ${bgClass}">
                  ${todayOverlay}
                </div>
              `;
            }).join('')}

          </div>
        `;
      });

      dashboard.innerHTML = html;
    }

    loadDashboard();
    setInterval(loadDashboard, 60000);
  </script>

</body>
</html>
