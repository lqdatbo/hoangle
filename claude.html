<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hand FX V4 Ultimate</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui}
#cam{position:fixed;inset:0}
video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
video{transform:scaleX(-1)}
/* fx canvas NOT mirrored — we flip coords manually so effects match mirrored video */
#fx{transform:none}
#ui{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);
  color:white;text-align:center;background:rgba(0,0,0,.35);
  padding:10px 18px;border-radius:16px;backdrop-filter:blur(10px);
  pointer-events:none;z-index:10
}
#start{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  padding:12px 28px;border:none;border-radius:12px;cursor:pointer;
  font-size:16px;font-weight:600;background:#fff;color:#000;z-index:20
}
</style>
</head>
<body>

<div id="cam">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="fx"></canvas>
</div>

<div id="ui">
  <div id="combo">Ready — Start Camera để bắt đầu</div>
</div>
<button id="start">▶ Start Camera</button>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("fx");
const ctx = canvas.getContext("2d");
const comboEl = document.getElementById("combo");

// ── resize ──────────────────────────────────────────────
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize();
addEventListener("resize", resize);

// ── finger detection ─────────────────────────────────────
// BUG FIX: dùng so sánh tọa độ y trực tiếp thay vì góc atan2
// (atan2 bị wrap-around ±π nên Math.abs(a-b) không đáng tin)
function isUp(lm, tip, pip) {
  return lm[tip].y < lm[pip].y - 0.02; // ngưỡng 0.02 tránh nhạy
}

function isThumbUp(lm) {
  const tipAboveMCP  = lm[4].y < lm[2].y - 0.04;
  const farFromIndex = Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y) > 0.1;
  const farFromPalm  = Math.hypot(lm[4].x-lm[0].x, lm[4].y-lm[0].y) > 0.12;
  return tipAboveMCP && farFromIndex && farFromPalm;
}

// ── stable gesture per-finger ────────────────────────────
// BUG FIX: mỗi ngón có history riêng, tránh block lẫn nhau
const gestureHistories = {};
function stableGesture(name, bufSize=10, threshold=7) {
  if (!gestureHistories[name]) gestureHistories[name] = [];
  const h = gestureHistories[name];
  h.push(true);
  if (h.length > bufSize) h.shift();
  return h.filter(Boolean).length >= threshold;
}
function unstableGesture(name) {
  if (!gestureHistories[name]) gestureHistories[name] = [];
  const h = gestureHistories[name];
  h.push(false);
  if (h.length > 10) h.shift();
}

// ── coord helper (mirror x for mirrored video) ──────────
function cx(lm_x) { return (1 - lm_x) * canvas.width; }
function cy(lm_y) { return lm_y * canvas.height; }

// ── particles ───────────────────────────────────────────
let particles = [];

function spawnBubble(x, y) {
  particles.push({
    type:'bub', x, y,
    vx:(Math.random()-.5)*.6, vy:-(1+Math.random()*1.3),
    life:1, r:10+Math.random()*18, hue:180+Math.random()*60
  });
}
function spawnSparkle(x, y) {
  for (let i=0;i<5;i++) {
    const a=Math.random()*Math.PI*2, s=.8+Math.random()*2.5;
    particles.push({type:'sp',x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,r:2+Math.random()*3,hue:40+Math.random()*260});
  }
}

function drawParticles() {
  particles = particles.filter(p => p.life > 0.02);
  for (const p of particles) {
    if (p.type === 'bub') {
      ctx.save();
      const a = p.life * .75;
      const g = ctx.createRadialGradient(p.x-p.r*.3,p.y-p.r*.3,p.r*.05,p.x,p.y,p.r);
      g.addColorStop(0, `rgba(255,255,255,${a*.55})`);
      g.addColorStop(.5,`rgba(140,220,255,${a*.2})`);
      g.addColorStop(1, `rgba(80,180,255,0)`);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = g; ctx.fill();
      ctx.strokeStyle = `rgba(160,235,255,${a*.9})`; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(p.x-p.r*.3,p.y-p.r*.3,p.r*.18,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${a*.8})`; ctx.fill();
      ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.vy+=.012; p.r+=.18; p.life-=.007;
    } else if (p.type === 'sp') {
      ctx.save();
      ctx.beginPath();
      for (let k=0;k<8;k++) {
        const ang = k*Math.PI/4 + p.life*4;
        const rad = k%2===0 ? p.r*3.5*p.life : p.r*p.life;
        k===0 ? ctx.moveTo(p.x+Math.cos(ang)*rad,p.y+Math.sin(ang)*rad)
              : ctx.lineTo(p.x+Math.cos(ang)*rad,p.y+Math.sin(ang)*rad);
      }
      ctx.closePath();
      ctx.fillStyle = `hsla(${p.hue},100%,78%,${p.life*.9})`;
      ctx.shadowColor = `hsl(${p.hue},100%,70%)`; ctx.shadowBlur = 6;
      ctx.fill(); ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.vy-=.04; p.life-=.02;
    }
  }
}

// ── lightning ────────────────────────────────────────────
function lightSeg(x1,y1,x2,y2,depth,spread) {
  if (depth===0) { ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();return; }
  const mx=(x1+x2)/2+(Math.random()-.5)*spread;
  const my=(y1+y2)/2+(Math.random()-.5)*spread;
  lightSeg(x1,y1,mx,my,depth-1,spread*.6);
  lightSeg(mx,my,x2,y2,depth-1,spread*.6);
}
function drawLightning(x, y) {
  const branches = 4+Math.floor(Math.random()*2);
  for (let b=0;b<branches;b++) {
    const a=-Math.PI/2+(Math.random()-.5)*Math.PI*.9;
    const len=40+Math.random()*60;
    const ex=x+Math.cos(a)*len, ey=y+Math.sin(a)*len;
    ctx.save();
    ctx.strokeStyle='rgba(200,150,255,.18)'; ctx.lineWidth=6; lightSeg(x,y,ex,ey,3,28);
    ctx.strokeStyle='rgba(220,170,255,.9)';  ctx.lineWidth=1.8;
    ctx.shadowColor='#bf80ff'; ctx.shadowBlur=14; lightSeg(x,y,ex,ey,3,22);
    ctx.strokeStyle='rgba(255,255,255,.7)';  ctx.lineWidth=.6; ctx.shadowBlur=4;
    lightSeg(x,y,ex,ey,2,14);
    ctx.restore();
  }
  ctx.save();
  ctx.beginPath(); ctx.arc(x,y,5+Math.random()*4,0,Math.PI*2);
  ctx.strokeStyle='rgba(210,150,255,.95)'; ctx.lineWidth=1.5;
  ctx.shadowColor='#bf80ff'; ctx.shadowBlur=12; ctx.stroke();
  ctx.restore();
}

// ── portal ───────────────────────────────────────────────
let portalAngle = 0;
function drawPortal(x, y) {
  ctx.save();
  for (let r=0;r<4;r++) {
    ctx.beginPath();
    ctx.ellipse(x,y,24+r*10,(24+r*10)*.42,portalAngle+r*.4,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,${100+r*20},0,${.2-r*.03})`;
    ctx.lineWidth=8-r; ctx.stroke();
  }
  const cols=['rgba(255,110,0,.95)','rgba(160,40,255,.85)','rgba(255,200,60,.7)'];
  for (let r=0;r<3;r++) {
    ctx.beginPath();
    ctx.ellipse(x,y,22+r*9,(22+r*9)*.4,portalAngle*(1+r*.3),0,Math.PI*2);
    ctx.strokeStyle=cols[r]; ctx.lineWidth=2.5-r*.5;
    ctx.shadowColor=cols[r]; ctx.shadowBlur=10; ctx.stroke();
  }
  for (let s=0;s<10;s++) {
    const sa=portalAngle*2.5+s*(Math.PI/5);
    ctx.beginPath();
    ctx.moveTo(x+Math.cos(sa)*26, y+Math.sin(sa)*26*.4);
    ctx.lineTo(x+Math.cos(sa)*(40+Math.random()*10), y+Math.sin(sa)*(40+Math.random()*10)*.4);
    ctx.strokeStyle=`hsl(${20+s*18},100%,70%)`; ctx.lineWidth=1.3;
    ctx.shadowColor='orange'; ctx.shadowBlur=6; ctx.stroke();
  }
  const grad=ctx.createRadialGradient(x,y,0,x,y,20);
  grad.addColorStop(0,'rgba(255,160,0,.4)'); grad.addColorStop(1,'rgba(100,0,200,0)');
  ctx.beginPath(); ctx.ellipse(x,y,20,9,portalAngle,0,Math.PI*2);
  ctx.fillStyle=grad; ctx.fill();
  ctx.restore();
}

// ── skeleton ─────────────────────────────────────────────
const FC=['#c084fc','#f97316','#38bdf8','#f472b6','#fbbf24'];
const CONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],
            [0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
function drawSkeleton(lm) {
  for (const [a,b] of CONN) {
    const fi=b<=4?0:b<=8?1:b<=12?2:b<=16?3:4;
    ctx.beginPath();
    ctx.moveTo(cx(lm[a].x),cy(lm[a].y));
    ctx.lineTo(cx(lm[b].x),cy(lm[b].y));
    ctx.strokeStyle=FC[fi]; ctx.lineWidth=2; ctx.stroke();
  }
  for (let i=0;i<21;i++) {
    const fi=i<=4?0:i<=8?1:i<=12?2:i<=16?3:4;
    ctx.beginPath();
    ctx.arc(cx(lm[i].x),cy(lm[i].y),i===0?7:4,0,Math.PI*2);
    ctx.fillStyle=FC[fi]; ctx.fill();
  }
}

// ── main frame ───────────────────────────────────────────
let frame=0, ltFrame=0, bubFrame=0, spFrame=0;
let labels=[];

function process(results) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  portalAngle += .045; frame++;
  labels = [];

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length===0) {
    drawParticles(); renderLabels(); return;
  }

  for (const lm of results.multiHandLandmarks) {
    drawSkeleton(lm);

    const thuUp = isThumbUp(lm);
    const idxUp = isUp(lm,8,6);
    const midUp = isUp(lm,12,10);
    const pnkUp = isUp(lm,20,18);

    // 👍 thumb → lightning
    thuUp ? stableGesture('thu') : unstableGesture('thu');
    if (stableGesture('thu') && ltFrame++%2===0) {
      drawLightning(cx(lm[4].x), cy(lm[4].y));
      labels.push('⚡ Lightning');
    }

    // ☝️ index → portal
    idxUp ? stableGesture('idx') : unstableGesture('idx');
    if (stableGesture('idx')) {
      drawPortal(cx(lm[8].x), cy(lm[8].y));
      labels.push('🌀 Portal');
    }

    // 🖕 middle → bubbles
    midUp ? stableGesture('mid') : unstableGesture('mid');
    if (stableGesture('mid') && bubFrame++%10===0) {
      spawnBubble(cx(lm[12].x), cy(lm[12].y));
      labels.push('🫧 Bubbles');
    }

    // 🤙 pinky → sparkle
    pnkUp ? stableGesture('pnk') : unstableGesture('pnk');
    if (stableGesture('pnk') && spFrame++%2===0) {
      spawnSparkle(cx(lm[20].x), cy(lm[20].y));
      labels.push('✨ Sparkle');
    }
  }

  drawParticles();
  renderLabels();
}

function renderLabels() {
  const unique=[...new Set(labels)];
  comboEl.innerText = unique.length ? unique.join('  ') : '✋ Giơ ngón tay bất kỳ';
}

// ── start ────────────────────────────────────────────────
document.getElementById("start").onclick = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"user", width:{ideal:1280}, height:{ideal:720} }
  });
  video.srcObject = stream;

  const hands = new Hands({ locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({ maxNumHands:2, modelComplexity:1,
    minDetectionConfidence:0.75, minTrackingConfidence:0.75 });
  hands.onResults(process);

  const camera = new Camera(video,{
    onFrame:async()=>{ await hands.send({image:video}); },
    width:1280, height:720
  });
  camera.start();
  document.getElementById("start").style.display="none";
  comboEl.innerText='✋ Giơ ngón tay bất kỳ';
};
</script>
</body>
</html>
